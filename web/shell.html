<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arena Rush</title>
    <style>
        :root {
            --bg: #090b0a;
            --panel: rgba(11, 18, 14, 0.78);
            --panel-border: rgba(159, 255, 101, 0.24);
            --acid: #9fff65;
            --acid-2: #37e6a1;
            --text: #ecf8e9;
            --muted: #8da18f;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 15%, rgba(55, 230, 161, 0.16), transparent 32rem),
                radial-gradient(circle at 82% 20%, rgba(159, 255, 101, 0.13), transparent 30rem),
                linear-gradient(135deg, #070807 0%, #101810 48%, #060706 100%);
            color: var(--text);
            font-family: Bahnschrift, "Agency FB", "Segoe UI", sans-serif;
        }

        body::before {
            position: fixed;
            inset: 0;
            pointer-events: none;
            content: "";
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.78), transparent 80%);
        }

        main {
            position: relative;
            display: grid;
            width: 100%;
            height: 100%;
            padding: clamp(14px, 3vw, 34px);
            grid-template-rows: auto 1fr auto;
            gap: 14px;
        }

        header,
        footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(0.72rem, 1.2vw, 0.92rem);
        }

        .brand {
            color: var(--text);
            font-size: clamp(1.1rem, 2.2vw, 2rem);
            font-weight: 800;
            letter-spacing: 0.22em;
            text-shadow: 0 0 22px rgba(159, 255, 101, 0.38);
        }

        .stage {
            position: relative;
            display: grid;
            min-height: 0;
            place-items: center;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.55),
                inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        .stage::after {
            position: absolute;
            inset: 0;
            pointer-events: none;
            content: "";
            border: 1px solid rgba(159, 255, 101, 0.12);
            transform: translate(10px, -10px);
        }

        canvas.emscripten {
            display: block;
            width: min(100%, calc((100vh - 160px) * 16 / 9));
            max-height: calc(100vh - 160px);
            aspect-ratio: 16 / 9;
            background: #000;
            outline: none;
            box-shadow: 0 0 0 1px rgba(159, 255, 101, 0.2);
        }

        .status-card {
            position: absolute;
            left: 18px;
            bottom: 18px;
            width: min(420px, calc(100% - 36px));
            padding: 14px 16px;
            border: 1px solid var(--panel-border);
            background: rgba(2, 5, 3, 0.76);
            backdrop-filter: blur(16px);
        }

        #status {
            margin-bottom: 10px;
            color: var(--text);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        progress {
            width: 100%;
            height: 8px;
            appearance: none;
        }

        progress::-webkit-progress-bar {
            background: rgba(255, 255, 255, 0.08);
        }

        progress::-webkit-progress-value {
            background: linear-gradient(90deg, var(--acid), var(--acid-2));
        }

        progress::-moz-progress-bar {
            background: linear-gradient(90deg, var(--acid), var(--acid-2));
        }

        #output {
            position: absolute;
            right: 18px;
            bottom: 18px;
            width: min(480px, calc(100% - 36px));
            max-height: 26vh;
            margin: 0;
            padding: 12px;
            overflow: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.5);
            color: #b5c8b4;
            font: 12px/1.45 Consolas, "Cascadia Mono", monospace;
            white-space: pre-wrap;
        }

        @media (max-width: 720px) {
            main {
                padding: 10px;
            }

            header,
            footer {
                align-items: flex-start;
                flex-direction: column;
            }

            canvas.emscripten {
                width: 100%;
                max-height: none;
            }

            #output {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div class="brand">Arena Rush</div>
            <div>WebAssembly build</div>
        </header>

        <section class="stage" aria-label="Arena Rush game canvas">
            <canvas id="canvas" class="emscripten" width="1280" height="720" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
            <div class="status-card">
                <div id="status">Preparing arena...</div>
                <progress id="progress" max="100" value="0"></progress>
            </div>
            <pre id="output"></pre>
        </section>

        <footer>
            <div>Click the canvas to focus controls</div>
            <div>WASD / Mouse / Escape</div>
        </footer>
    </main>

    <script>
        const statusElement = document.getElementById('status');
        const progressElement = document.getElementById('progress');
        const outputElement = document.getElementById('output');
        let totalDependencies = 0;

        function appendOutput(text) {
            outputElement.textContent += text + '\n';
            outputElement.scrollTop = outputElement.scrollHeight;
        }

        var Module = {
            canvas: document.getElementById('canvas'),
            print: appendOutput,
            printErr: appendOutput,
            setStatus: function(text) {
                statusElement.textContent = text || 'Running';
                if (!text) {
                    progressElement.value = 100;
                }
            },
            monitorRunDependencies: function(left) {
                totalDependencies = Math.max(totalDependencies, left);
                if (left) {
                    const completed = totalDependencies - left;
                    progressElement.value = totalDependencies ? (completed * 100 / totalDependencies) : 0;
                    Module.setStatus('Loading game data ' + completed + '/' + totalDependencies);
                } else {
                    progressElement.value = 100;
                    Module.setStatus('Launching');
                }
            }
        };

        window.addEventListener('keydown', function(event) {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(event.code)) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
